name: mefinder
channels:
  - conda-forge
  - bioconda
dependencies:
  # MobileElementFinder NAO esta no bioconda — vem do PyPI (com o banco MGEdb embutido).
  # Dependencias externas (blastn, kma) vem do conda.
  # python FIXO em 3.10 (intervalo amplo deixa a resolucao do conda lentissima).
  - python=3.10
  - blast>=2.9
  - kma>=1.3
  # setuptools<81: a v81 removeu pkg_resources, que o MobileElementFinder importa
  # em runtime -> sem este pin, falha com "No module named 'pkg_resources'".
  - setuptools<81
  - pip
  - pip:
      - MobileElementFinder
